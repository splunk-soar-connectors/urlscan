<div class="urlscan">
  {% if not rows %}
    <h4>No data found</h4>
  {% else %}
    {% for row in rows %}
      <div class="results">
        <h4>URL Info</h4>
        <table class="wf-table-horizontal datatable">
          <thead>
            <tr>
              <th>UUID</th>
              <th>IP</th>
              <th>CITY</th>
              <th>COUNTRY</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>{{ row.uuid or "None" }}</td>
              <td>{{ row.ip or "None" }}</td>
              <td>{{ row.city or "None" }}</td>
              <td>{{ row.country or "None" }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    {% endfor %}
  {% endif %}
</div>
