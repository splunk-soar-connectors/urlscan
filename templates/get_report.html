<style>
  .urlscan {
    overflow: auto;
    width: 100%;
    height: 100%;
    padding-left: 10px;
    padding-right: 10px;
  }

  .urlscan .wf-table-horizontal {
    border: 1px solid;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
    width: 100%;
  }

  .urlscan .wf-table-horizontal th,
  .urlscan .wf-table-horizontal td {
    border: 1px solid;
    padding: 5px 8px;
    vertical-align: top;
  }

  .urlscan .wf-table-horizontal th {
    text-align: center;
    text-transform: uppercase;
    font-weight: normal;
  }

  .urlscan .wf-h4-style {
    font-size: 16px;
  }

  .urlscan .wrap-text {
    overflow-wrap: anywhere;
    word-break: break-word;
  }
</style>
<div class="urlscan">
  {% if not rows %}
    <h4 class="wf-h4-style">No data found</h4>
  {% else %}
    {% for row in rows %}
      <div class="results">
        <h4 class="wf-h4-style">URL Info</h4>
        <table class="wf-table-horizontal datatable">
          <thead>
            <tr>
              <th>UUID</th>
              <th>IP</th>
              <th>CITY</th>
              <th>COUNTRY</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="wrap-text">{{ row.uuid or "None" }}</td>
              <td class="wrap-text">{{ row.ip or "None" }}</td>
              <td class="wrap-text">{{ row.city or "None" }}</td>
              <td class="wrap-text">{{ row.country or "None" }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    {% endfor %}
  {% endif %}
</div>
